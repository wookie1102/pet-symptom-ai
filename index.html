let apiKey = localStorage.getItem('pet_api_key') || '';
let selectedPet = null, petName = null, history = [], step = 0;

const chatWrap   = document.getElementById('chat-wrap');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const setupScreen= document.getElementById('setup-screen');
const appEl      = document.getElementById('app');
const apiInput   = document.getElementById('api-key-input');
const setupErr   = document.getElementById('setup-err');

// ── 저장된 키 있으면 바로 시작 ──
if (apiKey) launchApp();

document.getElementById('start-btn').addEventListener('click', () => {
  const key = apiInput.value.trim();
  if (key.length < 5) { setupErr.style.display = 'block'; return; }
  apiKey = key;
  localStorage.setItem('pet_api_key', key);
  launchApp();
});

document.getElementById('change-key-btn').addEventListener('click', () => {
  localStorage.removeItem('pet_api_key');
  location.reload();
});

function launchApp() {
  setupScreen.style.display = 'none';
  appEl.style.display = 'flex';
  if (chatWrap.children.length === 0) showPetSelect();
}

// ── 메시지 렌더 ──
function scrollBottom() { chatWrap.scrollTop = chatWrap.scrollHeight; }

function addMsg(role, text, urgency) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'ai' ? '🐾' : '😊';
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  wrap.appendChild(bubble);
  if (urgency) {
    const card = document.createElement('div');
    const cls = urgency.urgency === 'high' ? 'urg-high' : urgency.urgency === 'mid' ? 'urg-mid' : 'urg-low';
    const label = urgency.urgency === 'high' ? '🚨 긴급 — 즉시 병원 방문'
                : urgency.urgency === 'mid'  ? '⚠️ 주의 — 48~72시간 내 진료 권장'
                                             : '✅ 관찰 — 가정에서 모니터링 가능';
    card.className = 'urgency-card ' + cls;
    card.innerHTML = `<div class="urg-label">${label}</div>
      <div style="margin-bottom:4px">${urgency.reason}</div>
      <div style="font-size:12px;opacity:.85">${urgency.advice}</div>`;
    wrap.appendChild(card);
  }
  div.appendChild(av); div.appendChild(wrap);
  chatWrap.appendChild(div); scrollBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `<div class="avatar">🐾</div>
    <div class="bubble-wrap"><div class="typing-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div></div>`;
  chatWrap.appendChild(div); scrollBottom();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

// ── 펫 선택 ──
function showPetSelect() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar">🐾</div>
    <div class="bubble-wrap">
      <div class="bubble">안녕하세요! 반려동물 증상 AI 상담입니다 🐾<br>어떤 반려동물의 증상을 상담하실 건가요?</div>
      <div class="pet-select" id="pet-row">
        <button class="pet-btn" data-pet="강아지">🐶 강아지</button>
        <button class="pet-btn" data-pet="고양이">🐱 고양이</button>
        <button class="pet-btn" data-pet="토끼">🐰 토끼</button>
        <button class="pet-btn" data-pet="기타">🐾 기타</button>
      </div>
    </div>`;
  chatWrap.appendChild(div); scrollBottom();
  document.getElementById('pet-row').addEventListener('click', e => {
    const btn = e.target.closest('.pet-btn');
    if (!btn) return;
    selectedPet = btn.dataset.pet;
    document.querySelectorAll('.pet-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    setTimeout(() => {
      document.getElementById('pet-row').innerHTML =
        `<span style="font-size:12px;color:#9A9A9A">${selectedPet} 선택됨</span>`;
      step = 1; sendBtn.disabled = false;
      callAI([{ role:'user', content:`${selectedPet} 보호자입니다. 증상 상담을 받고 싶어요.` }]);
    }, 250);
  });
}

// ── AI 호출 ──
async function callAI(msgs) {
  addTyping(); sendBtn.disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM + `\n\n반려동물: ${selectedPet}` + (petName ? ` (이름: ${petName})` : ''),
        messages: msgs,
      })
    });
    const data = await res.json();
    removeTyping(); sendBtn.disabled = false;
    if (data.error) {
      removeTyping(); sendBtn.disabled = false;
      addMsg('ai', '❌ API 오류: ' + (data.error.message || '알 수 없는 오류') + '\n\n실제 API 키가 필요해요. console.anthropic.com 에서 발급받으세요.');
      return;
    }
    const raw = data.content?.map(c => c.text||'').join('') || '';
    let display = raw, urgency = null;
    const jm = raw.match(/\{[\s\S]*?"urgency"[\s\S]*?\}/);
    if (jm) { try { urgency = JSON.parse(jm[0]); } catch(e){} display = raw.replace(jm[0],'').trim(); }
    history.push({ role:'assistant', content: raw });
    addMsg('ai', display, urgency);
  } catch(e) {
    removeTyping(); sendBtn.disabled = false;
    const errMsg = e.message || '';
    if (errMsg.includes('401') || errMsg.includes('auth')) {
      addMsg('ai', '❌ API 키가 올바르지 않아요. 오른쪽 위 "키 변경" 버튼을 눌러서 실제 API 키를 입력해주세요.');
    } else {
      addMsg('ai', '오류가 발생했어요. 잠시 후 다시 시도해 주세요. (오류: ' + errMsg + ')');
    }
  }
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled || step === 0) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addMsg('user', text);
  history.push({ role:'user', content: text });
  const nm = text.match(/([가-힣]{1,5})(이|가|은|는)/);
  if (nm && !petName) petName = nm[1];
  await callAI([...history]);
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
  if (step > 0) sendBtn.disabled = inputEl.value.trim() === '';
});
</script>
